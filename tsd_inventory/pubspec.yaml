name: tsd_inventory
description: Инвентаризация ТМЦ для терминала сбора данных M3 SL20.
publish_to: 'none'
version: 0.2.0+2

environment:
  sdk: ^3.12.2
  flutter: '>=3.22.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  flutter_riverpod: ^2.5.1
  go_router: ^14.2.0
  dio: ^5.4.0
  retry: ^3.1.2
  drift: ^2.16.0
  sqlite3_flutter_libs: ^0.5.0
  flutter_secure_storage: ^9.0.0
  mobile_scanner: ^5.0.0
  audioplayers: ^6.0.0
  shared_preferences: ^2.2.0
  intl: ^0.19.0
  logging: ^1.2.0
  path_provider: ^2.1.0
  path: ^1.9.0
  package_info_plus: ^8.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  drift_dev: ^2.16.0
  build_runner: ^2.4.0
  mocktail: ^1.0.0
  flutter_lints: ^6.0.0
  image: ^4.9.1
  flutter_launcher_icons: ^0.14.4

flutter:
  uses-material-design: true

flutter_launcher_icons:
  android: "ic_launcher"
  ios: false
  image_path: "assets/icon.png"
  min_sdk_android: 30
  remove_alpha_ios: false
