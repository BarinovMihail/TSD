openapi: 3.0.0
info:
  title: TSD Update API
  version: 1.0.0
paths:
  /updates/latest:
    get:
      summary: Return the latest update manifest with a temporary APK URL
      parameters:
        - name: X-Update-Token
          in: header
          required: true
          schema:
            type: string
      x-yc-apigateway-integration:
        type: cloud_functions
        function_id: d4eotl7blcec645fmdot
        service_account_id: ajepolrs35p8pj8j4p2h
      responses:
        "200":
          description: Update manifest
          content:
            application/json:
              schema:
                type: object
        "401":
          description: Missing or invalid server token
        "502":
          description: Update manifest is unavailable
